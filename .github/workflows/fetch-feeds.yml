name: Fetch MMA News Feeds

on:
  schedule:
    # GitHub Actions cron uses UTC and does not adjust for Daylight Saving Time.
    # The Eastern Time notes below are EST equivalents; during EDT these run 1 hour later locally.

    # Weekdays: Mon-Fri at 7:00am, 10:00am, 1:00pm, and 4:00pm EST
    - cron: '0 12,15,18,21 * * 1-5'

    # Weekday evenings: Sun-Thu at 7:00pm and 9:00pm EST
    # (These execute at 00:00 and 02:00 UTC on Mon-Fri.)
    - cron: '0 0,2 * * 1-5'

    # Saturday evening into early Sunday morning: every 30 minutes
    # Sat 5:00pm-6:30pm EST (22:00-23:30 UTC Saturday)
    - cron: '0,30 22,23 * * 6'

    # Saturday evening into early Sunday morning: every 30 minutes
    # Sat 7:00pm EST through Sun 3:00am EST (00:00-08:00 UTC Sunday)
    - cron: '0,30 0-8 * * 0'

    # Sunday daytime: Sun 9:00am-12:00pm EST, hourly
    - cron: '0 14,15,16,17 * * 0'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests

      - name: Fetch RSS feeds
        run: |
          python fetch_feeds.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update MMA news feeds
          file_pattern: docs/mma-news.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
